version: "3.9"

# ============================================================
# Closira — Lumina Hair Studio AI Agent
#
# Usage:
#   Development (auto-reload):
#     docker compose --profile dev up
#
#   Production build:
#     docker compose up --build
#
#   With logs:
#     docker compose up --build --attach api
# ============================================================

services:

  # ── Production API ──────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: closira-api
    ports:
      - "${HOST_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      # Override specific vars here if needed.
      # GROQ_API_KEY must be set in .env
      GROQ_MODEL: ${GROQ_MODEL:-llama3-70b-8192}
      # Set this to your frontend origin in production, e.g.:
      # ALLOWED_ORIGINS: "https://yourfrontend.com"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    # Prevent the container from eating all memory on a runaway loop
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Dev override: hot-reload, mounts source as volume ──────
  api-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: closira-api-dev
    profiles: ["dev"]
    ports:
      - "${HOST_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      GROQ_MODEL: ${GROQ_MODEL:-llama3-8b-8192}   # faster/cheaper model for dev
      ALLOWED_ORIGINS: "*"
    # Mount source so code changes reload without rebuilding image
    volumes:
      - .:/app
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --log-level debug
    restart: "no"
